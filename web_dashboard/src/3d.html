<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Insight 3D Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/babylon.js"></script>
    <script src="/static/babylonjs.loaders.min.js"></script>
  </head>
  <body data-dashboard-view="3d">
    <div class="shell shell-3d-only">
      <div class="hud">
        <div class="alignment-panel" id="alignment-panel">
          <p class="eyebrow">Live Alignment</p>
          <div class="alignment-panel-row">
            <h2 id="alignment-status">Alignment OFF</h2>
            <div class="alignment-actions">
              <a href="/images" class="nav-button">Images</a>
              <a href="/recording" class="nav-button">Recording</a>
              <a href="/bags" class="nav-button">Bags</a>
              <a href="/scoring" class="nav-button">Scoring</a>
              <a href="/optimization" class="nav-button">Optimization</a>
              <button type="button" id="clear-trajectory-button" class="nav-button">Clear Trail</button>
              <button type="button" id="keep-trajectory-toggle" class="nav-button" aria-pressed="false">Keep Trail</button>
              <button type="button" id="alignment-toggle" class="alignment-button">Start Alignment</button>
            </div>
          </div>
          <p id="alignment-meta" class="alignment-meta">Web control ready</p>
        </div>
        <div class="legend" id="pose-legend"></div>
      </div>
      <canvas id="render-canvas"></canvas>
      <div class="footer">
        <span>Babylon.js GPU scene</span>
        <span id="model-status">Models: waiting</span>
      </div>
    </div>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
