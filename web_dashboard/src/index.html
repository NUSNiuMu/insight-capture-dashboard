<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Insight Web VIO Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/vendor/babylon.js"></script>
    <script src="/static/vendor/babylonjs.loaders.min.js"></script>
  </head>
  <body data-dashboard-view="full">
    <div class="shell">
      <div class="hud">
        <section class="postprocess-panel" id="postprocess-panel">
          <div class="panel-header">
            <div>
              <div class="panel-eyebrow">Rosbag Workflow</div>
              <h2>Post Processing</h2>
            </div>
            <button class="icon-button" id="refresh-bags-button" type="button" title="Refresh bags">Refresh</button>
          </div>
          <div class="recording-row">
            <button class="primary-button" id="start-recording-button" type="button">Start Recording</button>
            <button class="secondary-button" id="stop-recording-button" type="button">Stop Recording</button>
          </div>
          <div class="recording-status" id="recording-status">Recording status pending</div>
          <label class="bag-picker" for="rosbag-select">
            <span>Selected Rosbag</span>
            <select id="rosbag-select"></select>
          </label>
          <div class="postprocess-actions">
            <button type="button" data-post-action="coordinate-alignment">Coordinate Alignment</button>
            <button type="button" data-post-action="trajectory-scoring">Trajectory Scoring</button>
            <button type="button" data-post-action="trajectory-optimization">Trajectory Optimization</button>
          </div>
          <pre class="postprocess-output" id="postprocess-output">No rosbag selected.</pre>
        </section>
        <div class="legend" id="pose-legend"></div>
      </div>
      <div class="camera-dock" id="camera-dock"></div>
      <canvas id="render-canvas"></canvas>
      <div class="footer">
        <span>Babylon.js GPU scene</span>
        <span id="model-status">Models: waiting</span>
      </div>
    </div>
    <script type="module" src="/static/app.js"></script>
  </body>
  </html>
