<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Insight Web VIO Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
  </head>
  <body data-dashboard-view="full">
    <div class="shell">
      <div class="hud">
        <div class="alignment-panel" id="alignment-panel">
          <p class="eyebrow">Live Alignment</p>
          <div class="alignment-panel-row">
            <h2 id="alignment-status">Alignment OFF</h2>
            <div class="alignment-actions">
              <a href="/recording" class="nav-button">Open Recording</a>
              <button type="button" id="alignment-toggle" class="alignment-button">Start Alignment</button>
            </div>
          </div>
          <p id="alignment-meta" class="alignment-meta">Web control ready</p>
        </div>
        <div class="legend" id="pose-legend"></div>
      </div>
      <div class="camera-dock" id="camera-dock"></div>
      <canvas id="render-canvas"></canvas>
      <div class="footer">
        <span>Babylon.js GPU scene</span>
        <span id="model-status">Models: waiting</span>
      </div>
    </div>
    <script type="module" src="/static/app.js"></script>
  </body>
  </html>
