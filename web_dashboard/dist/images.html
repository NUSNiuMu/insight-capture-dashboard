<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Insight Images</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body data-dashboard-view="images">
    <div class="shell shell-page">
      <header class="page-header">
        <div>
          <div class="camera-page-eyebrow">INSIGHT</div>
          <h1>Images</h1>
        </div>
        <nav class="page-nav" aria-label="Dashboard pages">
          <a href="/3d">3D</a>
          <a href="/images" aria-current="page">Images</a>
          <a href="/recording">Recording</a>
          <a href="/bags">Bags</a>
          <a href="/scoring">Scoring</a>
          <a href="/optimization">Optimization</a>
        </nav>
      </header>

      <main>
        <div class="playback-panel" id="playback-panel">
          <p class="eyebrow">Bag Playback</p>
          <div class="playback-row">
            <select id="playback-bag-select" class="bag-select" data-bag-select></select>
            <button type="button" id="start-playback-button" class="recording-button">Play</button>
            <button type="button" id="stop-playback-button" class="recording-button" hidden>Stop</button>
            <button type="button" id="go-live-button" class="recording-button" hidden>Go Live</button>
          </div>
          <p id="playback-status" class="page-copy">Idle</p>
        </div>
        <div class="camera-dock image-camera-dock" id="camera-dock"></div>
      </main>
    </div>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
