<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Insight Trajectory Scoring</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body data-dashboard-view="scoring">
    <div class="shell shell-page">
      <header class="page-header">
        <div>
          <div class="camera-page-eyebrow">INSIGHT</div>
          <h1>Trajectory Scoring</h1>
          <p class="page-copy">Score VIO trajectory quality from a rosbag using covariance statistics.</p>
        </div>
        <nav class="page-nav" aria-label="Dashboard pages">
          <a href="/3d">3D</a>
          <a href="/images">Images</a>
          <a href="/recording">Recording</a>
          <a href="/bags">Bags</a>
          <a href="/scoring" aria-current="page">Scoring</a>
          <a href="/optimization">Optimization</a>
        </nav>
      </header>

      <main class="tool-panel">
        <p class="eyebrow">Scoring Input</p>
        <label class="field-label" for="scoring-bag-select">Rosbag</label>
        <select id="scoring-bag-select" class="bag-select" data-bag-select></select>
        <p id="scoring-bag-meta" class="page-copy">Loading bags...</p>

        <label class="field-label" for="scoring-topic">Topic <span class="page-copy">(auto-detected if blank - looks for PoseWithCovarianceStamped)</span></label>
        <input id="scoring-topic" class="field-input" type="text" placeholder="/camera/camera/vio_image_cov" autocomplete="off">

        <label class="field-label" for="scoring-ref-cov">Reference covariance <span class="page-copy">(covariance trace = score 100, default 1e-3)</span></label>
        <input id="scoring-ref-cov" class="field-input" type="text" placeholder="1e-3" autocomplete="off">

        <button id="run-scoring-button" type="button" class="recording-button">Run Scoring</button>

        <p class="eyebrow" id="scoring-status-eyebrow" hidden>Status</p>
        <p id="scoring-status" class="page-copy" hidden></p>

        <div id="scoring-result" hidden>
          <p class="eyebrow">Result</p>
          <div id="scoring-result-body"></div>
        </div>
      </main>
    </div>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
