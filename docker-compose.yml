# deploy/lite branch: stripped of the COLMAP-specific host mounts (custom
# sm_87 binary, matching libceres, the separate looper-vio-colmap-handoff
# repo) so this compose file only needs a plain JetPack Jetson to run —
# no per-device custom-compiled binaries required. The /optimization
# dashboard page (which shells out to COLMAP) won't work here; everything
# else (live view, 3D trajectory, recording, calibration) is unaffected.
# CUDA/runtime: nvidia are kept for other GPU acceleration.
services:
  insight-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      network: host    # Jetson iptables raw table workaround
    image: insight-dashboard:latest
    container_name: insight-dashboard

    # ── ROS2 requires host network for DDS multicast ─────────────────────────
    network_mode: host

    # ── NVIDIA Container Runtime for CUDA acceleration ───────────────────────
    runtime: nvidia

    # Docker's 64MB default /dev/shm is too small for QtWebEngine's Chromium
    # GPU process (open_web_3d_right.sh / open_monitor_dashboard.sh): its
    # command-buffer ring allocation fails silently and the WebGL canvas
    # never renders, both with real GPU (context-loss loop) and swiftshader
    # (AllocateRingBuffer failures).
    shm_size: '1gb'

    environment:
      - ROS_DOMAIN_ID=20           # Must match devices; override in .env if needed
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Uncomment to override default port:
      # - DASHBOARD_PORT=8765

    volumes:
      # ── Source code (live-mounted; no rebuild needed for code changes) ─────
      - .:/workspaces/insight_capture

      # CUDA runtime (kept for GPU acceleration; nothing on this branch
      # requires it yet, but the toolkit is cheap to have mounted).
      - /usr/local/cuda:/usr/local/cuda:ro

      # SSH keys for rosbag remote sync (optional; remove if not using sync)
      - /home/seeed/.ssh:/root/.ssh:ro

    restart: unless-stopped

    # ── Resource limits ──────────────────────────────────────────────────────
    # Leave some CPU headroom for ROS2 regardless of what else runs.
    deploy:
      resources:
        limits:
          cpus: '5.5'
